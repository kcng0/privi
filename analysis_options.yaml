# Static analysis for Privi.
# See https://dart.dev/lints and the flutter_lints package.

include: package:flutter_lints/flutter.yaml

analyzer:
  # Riverpod lints run through custom_lint.
  plugins:
    - custom_lint
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.config.dart"
    - "test/generated_migrations/**"
    - "build/**"
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    # Treat these as build-breaking to keep the codebase clean.
    invalid_annotation_target: ignore # noisy with Riverpod/Freezed annotations
    todo: ignore

linter:
  rules:
    # Style
    always_declare_return_types: true
    prefer_single_quotes: true
    prefer_final_locals: true
    prefer_const_constructors: true
    prefer_const_declarations: true
    require_trailing_commas: true
    directives_ordering: true
    sort_child_properties_last: true
    # Safety
    avoid_print: true
    use_build_context_synchronously: true
    unawaited_futures: true
    cancel_subscriptions: true
    close_sinks: true
