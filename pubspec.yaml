name: privateheart_vault
description: >-
  Privi — a personal, offline Android media vault by kcng0. Hides photos and
  videos from the system gallery, supports 1–3 heart ratings, favorites,
  playlist playback (built-in or VLC), and pattern/PIN + biometric lock.
  Dark theme only. MIT license.
publish_to: "none" # personal app — never published to pub.dev
version: 0.1.0+1

# NOTE: version constraints below are sensible starting points. Run
#   flutter pub get   (then optionally `flutter pub upgrade --major-versions`)
# to resolve and lock exact versions; confirm on pub.dev. See DEVELOPMENT.md.
environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State management (Riverpod 3.x with codegen) — see docs/03-architecture/state-management.md
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0

  # Local database (metadata) — see docs/03-architecture/data-model.md
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.24

  # Storage & paths
  path_provider: ^2.1.4
  path: ^1.9.0
  shared_preferences: ^2.3.2
  uuid: ^4.5.0

  # Import: file picker + share intent — see docs/02-design/screens/06-import.md
  file_picker: ^10.0.0
  receive_sharing_intent: ^1.8.0
  # System gallery albums for Visible tab
  photo_manager: ^3.6.0
  permission_handler: ^11.3.1

  # Playback: built-in player (video_player per D4) + external (VLC) hand-off
  video_player: ^2.9.2
  chewie: ^1.8.5
  android_intent_plus: ^5.2.0
  open_filex: ^4.5.0

  # Security: PIN hash + biometric — see docs/03-architecture/security.md
  local_auth: ^2.3.0
  local_auth_android: any
  local_auth_darwin: any
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.5

  # Formatting
  intl: ^0.19.0

  # Share selected gallery items (Visible → More)
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.13
  drift_dev: ^2.20.3
  riverpod_generator: ^3.0.0

  # Riverpod lint rules (run via custom_lint).
  # custom_lint must be >=0.8 to satisfy riverpod_generator 3.x → custom_lint_core ^0.8.
  custom_lint: ^0.8.1
  riverpod_lint: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/app_icon.png
    - assets/branding/app_icon_192.png
