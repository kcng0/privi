name: CI

# Continuous integration only — no release APKs.
# Release CD lives in release.yml and runs only on tag v* (or manual dispatch).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Generate code
        run: |
          flutter gen-l10n
          flutter pub run build_runner build

      - name: Analyze
        run: flutter analyze

      - name: Reject user-facing service strings
        run: |
          if rg -n "'(Hiding…|Unhiding…|Cancelled|Done|Wrong pattern|Wrong PIN|System authentication cancelled)'" lib/data lib/application; then
            echo "Map service/controller status through typed codes and l10n."
            exit 1
          fi

      - name: Test
        run: flutter test
