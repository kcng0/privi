name: Shorebird Patch

# Publish a signed Dart-only patch for an existing Shorebird base release.
# Native, plugin, manifest, asset, and Flutter engine changes are rejected.
on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Exact Shorebird release (e.g. 1.0.3+4)"
        required: true
        type: string
      track:
        description: "Patch rollout track"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - beta
          - stable

permissions:
  contents: read

jobs:
  patch:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          cache: true

      - name: Set up Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: Validate release input
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail
          if ! [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+\+[0-9]+$ ]]; then
            echo "error: release_version must be exact, for example 1.0.3+4" >&2
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: |
          flutter gen-l10n
          flutter pub run build_runner build

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Decode signing credentials
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
          SHOREBIRD_PATCH_PRIVATE_KEY: ${{ secrets.SHOREBIRD_PATCH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for v in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD SHOREBIRD_TOKEN SHOREBIRD_PATCH_PRIVATE_KEY; do
            if [ -z "${!v:-}" ]; then
              echo "error: missing repository secret: $v" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          mkdir -p android/app
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          test -s android/app/upload-keystore.jks
          {
            echo "storePassword=${ANDROID_KEYSTORE_PASSWORD}"
            echo "keyPassword=${ANDROID_KEY_PASSWORD}"
            echo "keyAlias=${ANDROID_KEY_ALIAS}"
            echo "storeFile=upload-keystore.jks"
          } > android/key.properties

          PATCH_PRIVATE_KEY="$RUNNER_TEMP/shorebird_patch_private.pem"
          printf '%s\n' "$SHOREBIRD_PATCH_PRIVATE_KEY" > "$PATCH_PRIVATE_KEY"
          test -s "$PATCH_PRIVATE_KEY"
          chmod 600 android/app/upload-keystore.jks android/key.properties "$PATCH_PRIVATE_KEY"

      - name: Publish signed patch
        id: shorebird-patch
        uses: shorebirdtech/shorebird-patch@v1
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        with:
          platform: android
          release-version: ${{ inputs.release_version }}
          args: >-
            --track=${{ inputs.track }}
            --private-key-path=${{ runner.temp }}/shorebird_patch_private.pem
            --public-key-path=shorebird_public.pem

      - name: Summarize patch
        env:
          PATCH_NUMBER: ${{ steps.shorebird-patch.outputs.patch-number }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          TRACK: ${{ inputs.track }}
        run: |
          {
            echo "## Shorebird patch published"
            echo
            echo "- Release: \`$RELEASE_VERSION\`"
            echo "- Patch: \`$PATCH_NUMBER\`"
            echo "- Track: \`$TRACK\`"
          } >> "$GITHUB_STEP_SUMMARY"
