name: Release APK

# Build a Shorebird-enabled sideloadable APK and publish a GitHub Release with:
#   - privi-<version>.apk
#   - SHA256SUMS (+ .sha256 sidecar)
# GitHub also auto-attaches Source code (zip) and Source code (tar.gz) for the tag.
#
# Triggers:
#   - push of a version tag: v0.1.0, v1.2.3, …
#   - manual run from the Actions tab (workflow_dispatch)
#
# Required repository secrets (release signing — never use debug.keystore):
#   ANDROID_KEYSTORE_BASE64   base64 of android/app/upload-keystore.jks
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD
#   SHOREBIRD_TOKEN           Shorebird CI token
# Generate locally with: ./scripts/setup-release-keystore.sh
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/use (e.g. v0.1.0). Leave empty to use pubspec version."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          cache: true

      - name: Set up Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: |
          flutter gen-l10n
          flutter pub run build_runner build

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Resolve version
        id: version
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          # pubspec: version: 0.1.0+1  →  name=0.1.0  code=1
          FULL=$(grep -E '^version:' pubspec.yaml | head -1 | awk '{print $2}')
          NAME="${FULL%%+*}"
          CODE="${FULL##*+}"
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$DISPATCH_TAG" ]; then
            TAG="$DISPATCH_TAG"
          elif [ "$REF_TYPE" = "tag" ]; then
            TAG="$REF_NAME"
          else
            TAG="v${NAME}"
          fi
          EXPECTED_TAG="v${NAME}"
          if [ "$TAG" != "$EXPECTED_TAG" ]; then
            echo "error: release tag '$TAG' must match pubspec version '$EXPECTED_TAG'" >&2
            exit 1
          fi
          FILE_VER="${TAG#v}"
          {
            echo "full=${FULL}"
            echo "name=${NAME}"
            echo "code=${CODE}"
            echo "tag=${TAG}"
            echo "file_ver=${FILE_VER}"
            echo "apk_name=privi-${FILE_VER}.apk"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved release: tag=${TAG} pubspec=${FULL} apk=privi-${FILE_VER}.apk"

      - name: Decode release credentials
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          set -euo pipefail
          missing=0
          for v in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD SHOREBIRD_TOKEN; do
            if [ -z "${!v:-}" ]; then
              echo "error: missing repository secret: $v" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Configure secrets via: ./scripts/setup-release-keystore.sh" >&2
            echo "Repo → Settings → Secrets and variables → Actions" >&2
            exit 1
          fi

          mkdir -p android/app
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          test -s android/app/upload-keystore.jks

          # Paths in key.properties are relative to android/app/ (see build.gradle.kts).
          {
            echo "storePassword=${ANDROID_KEYSTORE_PASSWORD}"
            echo "keyPassword=${ANDROID_KEY_PASSWORD}"
            echo "keyAlias=${ANDROID_KEY_ALIAS}"
            echo "storeFile=upload-keystore.jks"
          } > android/key.properties
          chmod 600 android/app/upload-keystore.jks android/key.properties

      - name: Create Shorebird release APK
        id: shorebird-release
        uses: shorebirdtech/shorebird-release@v1
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        with:
          flutter-version: "3.44.6"
          platform: android
          args: >-
            --artifact=apk
            --public-key-path=shorebird_public.pem

      - name: Verify APK is release-signed (not debug)
        run: |
          set -euo pipefail
          APK="build/app/outputs/flutter-apk/app-release.apk"
          test -f "$APK"
          CERT_OUT=$(mktemp)
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/Android/Sdk}}"
          APKSIGNER=$(find "$SDK_ROOT" -path '*/build-tools/*/apksigner' 2>/dev/null | sort -V | tail -1 || true)
          if [ -n "${APKSIGNER:-}" ] && [ -x "$APKSIGNER" ]; then
            "$APKSIGNER" verify --print-certs "$APK" | tee "$CERT_OUT"
          else
            # Fallback: print v1 JAR signing cert from META-INF (Flutter still embeds it).
            unzip -p "$APK" 'META-INF/*.RSA' 'META-INF/*.DSA' 'META-INF/*.EC' 2>/dev/null \
              | keytool -printcert | tee "$CERT_OUT"
          fi
          # apksigner formats vary: "Signer #1", "V2 Signer:", "Owner:", "certificate DN:"
          if ! grep -qiE 'Owner:|Signer #|Signer:|certificate DN:|DN:' "$CERT_OUT"; then
            echo "error: could not read APK signing certificate" >&2
            cat "$CERT_OUT" >&2 || true
            exit 1
          fi
          if grep -qiE 'CN=Android Debug|Android Debug' "$CERT_OUT"; then
            echo "error: APK is still debug-signed — check key.properties / secrets" >&2
            exit 1
          fi
          echo "OK: APK is release-signed (not Android Debug)"
          # Show DN line(s) for the release notes / audit trail
          grep -iE 'DN:|Owner:|Signer' "$CERT_OUT" || true

      - name: Stage APK and checksums
        id: artifacts
        run: |
          set -euo pipefail
          SRC="build/app/outputs/flutter-apk/app-release.apk"
          APK="privi-${{ steps.version.outputs.file_ver }}.apk"
          test -f "$SRC"
          cp "$SRC" "$APK"

          # SHA-256 (standard for release verification)
          SHA256=$(sha256sum "$APK" | awk '{print $1}')
          # SHA-512 optional companion
          SHA512=$(sha512sum "$APK" | awk '{print $1}')
          SIZE_BYTES=$(stat -c%s "$APK")
          SIZE_HUMAN=$(numfmt --to=iec --suffix=B "$SIZE_BYTES")

          # GNU coreutils style checksum file (sha256sum -c SHA256SUMS)
          echo "${SHA256}  ${APK}" > SHA256SUMS
          # Sidecar next to the APK
          echo "${SHA256}" > "${APK}.sha256"
          # Combined checksums file for the release
          {
            echo "# Privi ${{ steps.version.outputs.tag }} checksums"
            echo "# Generated $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "#"
            echo "# Verify:"
            echo "#   sha256sum -c SHA256SUMS"
            echo "#   sha256sum -c ${APK}.sha256  # (needs filename mapping; prefer SHA256SUMS)"
            echo "#"
            echo "SHA256 (${APK}) = ${SHA256}"
            echo "SHA512 (${APK}) = ${SHA512}"
            echo "SIZE   (${APK}) = ${SIZE_BYTES} bytes (${SIZE_HUMAN})"
          } > CHECKSUMS.txt

          ls -lh "$APK" SHA256SUMS "${APK}.sha256" CHECKSUMS.txt

          {
            echo "apk_path=${APK}"
            echo "sha256=${SHA256}"
            echo "sha512=${SHA512}"
            echo "size_bytes=${SIZE_BYTES}"
            echo "size_human=${SIZE_HUMAN}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: privi-${{ steps.version.outputs.file_ver }}-release
          path: |
            ${{ steps.artifacts.outputs.apk_path }}
            ${{ steps.artifacts.outputs.apk_path }}.sha256
            SHA256SUMS
            CHECKSUMS.txt
          if-no-files-found: error
          retention-days: 30

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Privi ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          # APK + checksum files. Source code zip/tar.gz are attached by GitHub automatically.
          files: |
            ${{ steps.artifacts.outputs.apk_path }}
            ${{ steps.artifacts.outputs.apk_path }}.sha256
            SHA256SUMS
            CHECKSUMS.txt
          fail_on_unmatched_files: true
          body: |
            ## Privi ${{ steps.version.outputs.tag }}

            Sideload APK for Android 8.0+ (API 26). Media stays on-device; no cloud storage, accounts, or analytics.
            **License:** MIT (see `LICENSE`).

            ### Downloads

            | Asset | Notes |
            |-------|--------|
            | `${{ steps.version.outputs.apk_name }}` | Installable APK (~${{ steps.artifacts.outputs.size_human }}) |
            | `SHA256SUMS` | `sha256sum -c SHA256SUMS` |
            | `${{ steps.version.outputs.apk_name }}.sha256` | Raw SHA-256 of the APK |
            | `CHECKSUMS.txt` | SHA-256, SHA-512, and size |
            | **Source code (zip / tar.gz)** | Auto-attached by GitHub for this tag |

            ### Checksums

            ```
            SHA256 (${{ steps.version.outputs.apk_name }}) = ${{ steps.artifacts.outputs.sha256 }}
            SHA512 (${{ steps.version.outputs.apk_name }}) = ${{ steps.artifacts.outputs.sha512 }}
            SIZE   (${{ steps.version.outputs.apk_name }}) = ${{ steps.artifacts.outputs.size_bytes }} bytes
            ```

            ### Install

            1. Download `${{ steps.version.outputs.apk_name }}` (and optionally `SHA256SUMS`).
            2. Verify (desktop):
               ```bash
               sha256sum -c SHA256SUMS
               ```
            3. On your phone, open the APK and allow install from that source if asked.
            4. If Play Protect warns on first install of a new signature, choose **More details → Install anyway** and leave **Improve harmful app detection** enabled so Google can learn this build is safe.
            5. Launch **Privi**. Future compatible Dart updates download in the background and apply on the next restart without reinstalling the APK.

            | | |
            |---|---|
            | **pubspec version** | `${{ steps.version.outputs.full }}` |
            | **Shorebird release** | `${{ steps.shorebird-release.outputs.release-version }}` |
            | **Code push** | signed Dart patches; native/plugin/asset changes require a new APK |
            | **Signing** | permanent release keystore (CI secrets) |
            | **Min Android** | 8.0 (API 26) |
            | **targetSdk** | 36 |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
