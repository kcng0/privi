name: Release APK

# Build a sideloadable release APK and publish it as a GitHub Release.
# Triggers:
#   - push of a version tag: v0.1.0, v1.2.3, …
#   - manual run from the Actions tab (workflow_dispatch)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/use (e.g. v0.1.0). Leave empty to use pubspec version."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          # pubspec: version: 0.1.0+1  →  name=0.1.0  code=1
          FULL=$(grep -E '^version:' pubspec.yaml | head -1 | awk '{print $2}')
          NAME="${FULL%%+*}"
          CODE="${FULL##*+}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v${NAME}"
          fi
          # strip leading v for the filename version segment
          FILE_VER="${TAG#v}"
          {
            echo "full=${FULL}"
            echo "name=${NAME}"
            echo "code=${CODE}"
            echo "tag=${TAG}"
            echo "file_ver=${FILE_VER}"
            echo "apk_name=privi-${FILE_VER}.apk"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved release: tag=${TAG} pubspec=${FULL} apk=privi-${FILE_VER}.apk"

      - name: Build release APK
        run: flutter build apk --release

      - name: Stage APK
        run: |
          set -euo pipefail
          SRC="build/app/outputs/flutter-apk/app-release.apk"
          DEST="privi-${{ steps.version.outputs.file_ver }}.apk"
          test -f "$SRC"
          cp "$SRC" "$DEST"
          ls -lh "$DEST"
          echo "APK_PATH=$DEST" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.apk_name }}
          path: ${{ env.APK_PATH }}
          if-no-files-found: error
          retention-days: 30

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Privi ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: ${{ env.APK_PATH }}
          fail_on_unmatched_files: true
          body: |
            ## Privi ${{ steps.version.outputs.tag }}

            Sideload APK for Android 8.0+ (API 26).

            | | |
            |---|---|
            | **APK** | `${{ steps.version.outputs.apk_name }}` |
            | **pubspec version** | `${{ steps.version.outputs.full }}` |
            | **Signing** | debug keystore (personal sideload build) |

            ### Install
            1. Download `${{ steps.version.outputs.apk_name }}` below.
            2. Open it on your phone and allow install from this source if asked.
            3. Launch **Privi**.

            Offline media vault — no cloud, no accounts, no analytics.
            MIT License (see `LICENSE`).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
